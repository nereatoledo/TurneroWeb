<nav class="navbar navbar-expand-lg px-4 py-3 shadow-sm d-flex justify-content-between align-items-center bg-white">

    <div class="d-flex align-items-center gap-3">
        <a class="navbar-brand font-weight-bold m-0" style="color: #8923dc;" routerLink="/">Turnero Web</a>
    </div>

    <div class="position-relative ms-auto">
        <button (click)="toggleDropdown()" class="btn nav-role-btn d-flex align-items-center gap-2 font-weight-bold">
            <i class="fa fa-user"></i>
            <span>{{ currentUser ? currentUser.username : 'Invitado' }}</span>
            <i class="fa fa-chevron-down ms-1" style="font-size: 0.8rem; transition: transform 0.3s;"
                [style.transform]="dropdownOpen ? 'rotate(180deg)' : 'rotate(0deg)'"></i>
        </button>

        <div *ngIf="dropdownOpen" (click)="dropdownOpen = false" class="position-fixed w-100 h-100 top-0 start-0"
            style="z-index: 1040;"></div>

        <div *ngIf="dropdownOpen"
            class="position-absolute bg-white shadow-sm rounded custom-dropdown-menu end-0 mt-2 py-2"
            style="min-width: 220px; z-index: 1050; border: 1px solid #eaeaea;">

            <ng-container *ngIf="currentUser; else notLoggedIn">
                <div class="px-3 py-1 mb-1 text-muted"
                    style="font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">
                    Opciones
                </div>

                <a class="dropdown-item role-item d-flex align-items-center gap-3 px-3 py-2 border-0 text-decoration-none text-dark" style="cursor: pointer;">
                    <i class="fa fa-cog" style="width: 20px; text-align: center; font-size: 1.1rem;"></i>
                    <span class="font-weight-bold flex-grow-1">Configuración</span>
                </a>

                <a [routerLink]="['/registro', currentUser.id]" (click)="dropdownOpen = false"
                    class="dropdown-item role-item d-flex align-items-center gap-3 px-3 py-2 border-0 text-decoration-none text-dark" style="cursor: pointer;">
                    <i class="fa fa-pencil" style="width: 20px; text-align: center; font-size: 1.1rem;"></i>
                    <span class="font-weight-bold flex-grow-1">Editar perfil</span>
                </a>
                
                <div class="dropdown-divider"></div>
                
                <button (click)="logout()"
                    class="dropdown-item role-item d-flex align-items-center gap-3 px-3 py-2 border-0 text-danger">
                    <i class="fa fa-sign-out" style="width: 20px; text-align: center; font-size: 1.1rem;"></i>
                    <span class="font-weight-bold flex-grow-1">Cerrar Sesión</span>
                </button>
            </ng-container>

            <ng-template #notLoggedIn>
                <div class="px-3 py-1 mb-1 text-muted"
                    style="font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">
                    Acceso
                </div>
                <a routerLink="/login" (click)="dropdownOpen = false"
                    class="dropdown-item role-item d-flex align-items-center gap-3 px-3 py-2 border-0 text-decoration-none text-dark">
                    <i class="fa fa-sign-in" style="width: 20px; text-align: center; font-size: 1.1rem;"></i>
                    <span class="font-weight-bold flex-grow-1">Iniciar Sesión</span>
                </a>
                <a routerLink="/registro" (click)="dropdownOpen = false"
                    class="dropdown-item role-item d-flex align-items-center gap-3 px-3 py-2 border-0 text-decoration-none text-dark">
                    <i class="fa fa-user-plus" style="width: 20px; text-align: center; font-size: 1.1rem;"></i>
                    <span class="font-weight-bold flex-grow-1">Registrarse</span>
                </a>
            </ng-template>

        </div>
    </div>
</nav>

<div class="container-fluid p-0">
    <router-outlet></router-outlet>
</div>
