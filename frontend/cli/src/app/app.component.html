<nav class="navbar navbar-expand-lg px-4 py-3 shadow-sm d-flex justify-content-between align-items-center bg-white">

    <div class="d-flex align-items-center gap-3">
        <a class="navbar-brand font-weight-bold m-0" style="color: #8923dc;" routerLink="/">Turnero Web</a>
    </div>

    <div class="position-relative ms-auto">

        <button (click)="toggleDropdown()" class="btn nav-role-btn d-flex align-items-center gap-2 font-weight-bold">
            <i class="fa"
                [ngClass]="{'fa-user-md': rolActual === 'Administrador', 'fa-user': rolActual === 'Usuario', 'fa-users': rolActual === 'Seleccionar Entorno'}"></i>
            <span>{{ rolActual }}</span>
            <i class="fa fa-chevron-down ms-1" style="font-size: 0.8rem; transition: transform 0.3s;"
                [style.transform]="dropdownOpen ? 'rotate(180deg)' : 'rotate(0deg)'"></i>
        </button>

        <div *ngIf="dropdownOpen" (click)="dropdownOpen = false" class="position-fixed w-100 h-100 top-0 start-0"
            style="z-index: 1040;"></div>

        <div *ngIf="dropdownOpen"
            class="position-absolute bg-white shadow-sm rounded custom-dropdown-menu end-0 mt-2 py-2"
            style="min-width: 220px; z-index: 1050; border: 1px solid #eaeaea;">

            <div class="px-3 py-1 mb-1 text-muted"
                style="font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">
                Entorno
            </div>

            <button (click)="cambiarRol('Administrador')"
                class="dropdown-item role-item d-flex align-items-center gap-3 px-3 py-2 border-0"
                [ngClass]="{'active-role': rolActual === 'Administrador'}">
                <i class="fa fa-user-md" style="width: 20px; text-align: center; font-size: 1.1rem;"></i>
                <span class="font-weight-bold flex-grow-1">Administrador</span>
                <i *ngIf="rolActual === 'Administrador'" class="fa fa-check text-success"></i>
            </button>

            <button (click)="cambiarRol('Usuario')"
                class="dropdown-item role-item d-flex align-items-center gap-3 px-3 py-2 border-0"
                [ngClass]="{'active-role': rolActual === 'Usuario'}">
                <i class="fa fa-user" style="width: 20px; text-align: center; font-size: 1.1rem;"></i>
                <span class="font-weight-bold flex-grow-1">Usuario</span>
                <i *ngIf="rolActual === 'Usuario'" class="fa fa-check text-success"></i>
            </button>

        </div>
    </div>
</nav>

<div class="container-fluid p-0">
    <router-outlet></router-outlet>
</div>
