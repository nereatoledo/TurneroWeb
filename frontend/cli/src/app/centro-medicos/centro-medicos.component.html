<div class="container py-4 page-animation">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
        
        <div class="d-flex align-items-center gap-3">
            <button (click)="goBack()" class="btn btn-outline-secondary btn-icon-only" title="Volver a Centros">
                <i class="fa fa-arrow-left m-0"></i>
            </button>
            <h2 class="custom-title m-0">Médicos de {{ centroNombre }}</h2>
        </div>

        <button *ngIf="isAdmin" class="btn-purple-main">
            <i class="fa fa-plus"></i> Asociar Médico
        </button>
    </div>
    
    <div class="content-wrapper">
        <div class="table-responsive">
            <table class="table-custom">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nombre del Médico</th>
                        <th>Matrícula</th>
                        <th class="text-right">Operaciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let medico of medicos; let i = index">
                        <td class="text-muted font-weight-bold">#{{ i + 1 }}</td>
                        <td style="font-weight: 500;">{{ medico.apellido }}, {{ medico.nombre }}</td>
                        <td><span class="badge bg-light text-dark border">{{ medico.matricula }}</span></td>
                        <td class="text-right">
                            
                            <button *ngIf="isAdmin" class="btn-danger-custom btn-sm" (click)="desasociar(medico)">
                                <i class="fa fa-unlink"></i> Desasociar
                            </button>
                        
                        </td>
                    </tr>
                    <tr *ngIf="medicos.length === 0">
                        <td colspan="4" class="text-center py-4 text-muted">No hay médicos asociados a este centro.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="mt-4">
        <button (click)="goBack()" class="btn-outline-purple">
            <i class="fa fa-arrow-left"></i> Volver
        </button>
    </div>
</div>
