<div class="container py-4 page-animation" style="max-width: 800px;">
    <div *ngIf="centro_atencion">

        <h2 class="custom-title mb-4">
            {{ centro_atencion.id ? 'Editar Centro: ' + centro_atencion.nombre : 'Nuevo Centro de Atención' }}
        </h2>

        <div class="form-wrapper">
            <form #form="ngForm">

                <div class="form-group mb-4">
                    <label for="nombre" class="custom-label">Nombre del Centro</label>
                    <input [(ngModel)]="centro_atencion.nombre" name="nombre" class="form-control custom-input" required
                        #nombre="ngModel" placeholder="Ej: Centro Médico Rawson" />
                    <div *ngIf="nombre.invalid && (nombre.dirty || nombre.touched)" class="text-danger small mt-1">
                        El nombre es requerido.
                    </div>
                </div>
                <div class="row">
                    <div class="form-group mb-4 col-md-8">
                        <label for="direccion" class="custom-label">Dirección</label>
                        <input [(ngModel)]="centro_atencion.direccion" name="direccion"
                            class="form-control custom-input" required #direccion="ngModel"
                            placeholder="Ej: Av. San Martín 1234" />
                        <div *ngIf="direccion.invalid && (direccion.dirty || direccion.touched)"
                            class="text-danger small mt-1">
                            La dirección es requerida.
                        </div>
                    </div>
                    <div class="form-group mb-4 col-md-4">
                        <label for="telefono" class="custom-label">Teléfono</label>
                        <input [(ngModel)]="centro_atencion.telefono" name="telefono" class="form-control custom-input"
                            required pattern="^[0-9 \-\+]+$" #telefono="ngModel" placeholder="Ej: 0280 445-XXXX" />
                        <div *ngIf="telefono.invalid && (telefono.dirty || telefono.touched)"
                            class="text-danger small mt-1">
                            <span *ngIf="telefono.errors?.['required']">El teléfono es requerido.</span>
                            <span *ngIf="telefono.errors?.['pattern']">Formato inválido.</span>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="form-group mb-4 col-md-6">
                        <label for="localidad" class="custom-label">Localidad</label>
                        <input [(ngModel)]="centro_atencion.localidad" name="localidad"
                            class="form-control custom-input" required #localidad="ngModel" placeholder="Ej: Trelew" />
                        <div *ngIf="localidad.invalid && (localidad.dirty || localidad.touched)"
                            class="text-danger small mt-1">
                            La localidad es requerida.
                        </div>
                    </div>
                    <div class="form-group mb-4 col-md-6">
                        <label for="provincia" class="custom-label">Provincia</label>
                        <input [(ngModel)]="centro_atencion.provincia" name="provincia"
                            class="form-control custom-input" required #provincia="ngModel" placeholder="Ej: Chubut" />
                        <div *ngIf="provincia.invalid && (provincia.dirty || provincia.touched)"
                            class="text-danger small mt-1">
                            La provincia es requerida.
                        </div>
                    </div>
                </div>
                <hr class="my-4" style="border-color: #e2e8f0;">
                <h5 class="mb-3 text-muted" style="font-size: 1rem; font-weight: 600;">Geolocalización</h5>
                <div class="row">
                    <div class="form-group mb-4 col-md-6">
                        <label for="latitud" class="custom-label">Latitud</label>
                        <input type="number" step="any" [(ngModel)]="centro_atencion.coordenadas.latitud" name="latitud"
                            class="form-control custom-input" required #latitud="ngModel" />
                    </div>
                    <div class="form-group mb-4 col-md-6">
                        <label for="longitud" class="custom-label">Longitud</label>
                        <input type="number" step="any" [(ngModel)]="centro_atencion.coordenadas.longitud"
                            name="longitud" class="form-control custom-input" required #longitud="ngModel" />
                    </div>
                </div>
                <div class="d-flex justify-content-end mt-2 pt-3 border-top" style="border-color: #e2e8f0 !important;">
                    <button (click)="goBack()" class="btn-action btn-back mr-3" type="button">
                        <i class="fa fa-arrow-left"></i> Atrás
                    </button>

                    <button (click)="save()" class="btn-purple-main" [disabled]="form.invalid" type="button">
                        <i class="fa fa-save"></i> {{ centro_atencion.id ? 'Actualizar' : 'Guardar' }}
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>
