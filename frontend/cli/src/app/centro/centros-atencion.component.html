<div class="container py-4 page-animation">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
    
    <div class="d-flex align-items-center gap-3">
      <button (click)="goBack()" class="btn btn-outline-secondary btn-icon-only" title="Volver al Panel">
        <i class="fa fa-arrow-left m-0"></i>
      </button>
      <h2 class="custom-title m-0">Centros de Atención</h2>
    </div>

    <a *ngIf="isAdmin" routerLink="/centros_atencion/new" class="btn-purple-main">
      <i class="fa fa-plus"></i> Nuevo Centro
    </a>
  </div>

  <div class="row mb-4">
    <div class="col-md-5">
      <label class="mb-1 font-weight-bold" style="color: #6c757d; font-size: 0.85rem; text-transform: uppercase;">
        Buscar Centro de Atención
      </label>
      <div class="d-flex align-items-center gap-2">
        <div class="position-relative w-100">
          <input type="text" class="form-control" 
            [(ngModel)]="terminoBusqueda"
            (ngModelChange)="checkSearchClear($event)"
            [ngbTypeahead]="searchCentro" 
            [resultFormatter]="resultFormatCentro" 
            [inputFormatter]="inputFormatCentro"
            (selectItem)="onCentroSelected($event)"
            placeholder="Ej: Trelew, Rawson..." 
            style="border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 10px 15px;" />
        </div>
        <button *ngIf="terminoBusqueda" (click)="limpiarBusqueda()" class="btn btn-outline-danger btn-icon-only" title="Limpiar búsqueda" style="border-radius: 8px;">
          <i class="fa fa-times m-0"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="content-wrapper">
    <div class="table-responsive">
      <table class="table-custom">
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th class="text-right">Operaciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let centro_atencion of resultsPage.content">
            <td class="text-muted font-weight-bold">#{{ centro_atencion.id }}</td>
            <td style="font-weight: 500;">{{ centro_atencion.nombre }}</td>
            <td class="text-right d-flex gap-2 justify-content-end">

              <a *ngIf="isAdmin" [routerLink]="[prefix + '/centros_atencion', centro_atencion.id, 'consultorios']"
                class="btn-outline-purple btn-icon-only" title="Consultorios">
                <i class="fa fa-list m-0"></i>
              </a>

              <a [routerLink]="[prefix + '/centros_atencion/agenda']" [queryParams]="{ centroId: centro_atencion.id }"
                class="btn-outline-purple" title="Turnos">
                <i class="fa fa-calendar"></i> Turnos
              </a>

              <a [routerLink]="[prefix + '/centros_atencion', centro_atencion.id, 'especialidades']"
                class="btn-outline-purple" title="Especialidades">
                <i class="fa fa-tags"></i> Especialidades
              </a>
              
              <a [routerLink]="[prefix + '/centros_atencion', centro_atencion.id, 'medicos']"
                class="btn-outline-purple" title="Médicos">
                <i class="fa fa-user-md"></i> Médicos
              </a>

              <a *ngIf="isAdmin" [routerLink]="['/centros_atencion', centro_atencion.id]" class="btn-purple-main btn-icon-only"
                title="Editar">
                <i class="fa fa-pencil m-0"></i>
              </a>

              <button *ngIf="isAdmin" (click)="remove(centro_atencion)" class="btn-danger-custom btn-icon-only" title="Borrar">
                <i class="fa fa-trash m-0"></i>
              </button>

            </td>
          </tr>
          <tr *ngIf="resultsPage.content?.length === 0">
            <td colspan="3" class="text-center py-4 text-muted">No hay centros registrados.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="d-flex justify-content-center mt-4" *ngIf="!terminoBusqueda || typeofTermino !== 'object'">
    <app-pagination [totalPages]="resultsPage.totalPages" [currentPage]="currentPage"
      (pageChangeRequested)="onPageChangeRequested($event)" [number]="resultsPage.number"
      [hidden]="resultsPage.numberOfElements < 1">
    </app-pagination>
  </div>
</div>
