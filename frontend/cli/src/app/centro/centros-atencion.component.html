<div class="container py-4 page-animation">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
    <h2 class="custom-title m-0">Centros de Atención</h2>
    <a routerLink="/centros_atencion/new" class="btn-purple-main">
      <i class="fa fa-plus"></i> Nuevo Centro
    </a>
  </div>
         
  <div class="content-wrapper">
    <div class="table-responsive">
      <table class="table-custom">
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th class="text-right">Operaciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let centro_atencion of resultsPage.content">
            <td class="text-muted font-weight-bold">#{{ centro_atencion.id }}</td>
            <td style="font-weight: 500;">{{ centro_atencion.nombre }}</td>
            <td class="text-right">
                                 
              <a [routerLink]="['/centros_atencion', centro_atencion.id, 'consultorios']" class="btn-outline-purple btn-sm mr-2" title="Consultorios">
                <i class="fa fa-list"></i>
              </a>
              <a [routerLink]="['/centros_atencion', centro_atencion.id, 'especialidades']" class="btn-outline-purple btn-sm mr-2" title="Especialidades">
                <i class="fa fa-tags"></i>
              </a>
              <a [routerLink]="['/centros_atencion', centro_atencion.id, 'medicos']" class="btn-outline-purple btn-sm mr-2" title="Médicos">
                <i class="fa fa-user-md"></i>
              </a>
              <a [routerLink]="['/centros_atencion', centro_atencion.id]" class="btn-purple-main btn-sm mr-2" title="Editar">
                <i class="fa fa-pencil"></i>
              </a>
                                 
              <button (click)="remove(centro_atencion)" class="btn-danger-custom btn-sm" title="Borrar">
                <i class="fa fa-trash"></i>
              </button>
            </td>
          </tr>
          <tr *ngIf="resultsPage.content?.length === 0">
             <td colspan="3" class="text-center py-4 text-muted">No hay centros registrados.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
         
  <div class="d-flex justify-content-center mt-4">
    <app-pagination
      [totalPages]="resultsPage.totalPages"
      [currentPage]="currentPage"
      (pageChangeRequested)="onPageChangeRequested($event)"
      [number]="resultsPage.number"
      [hidden]="resultsPage.numberOfElements < 0">
    </app-pagination>
  </div>
</div>
