<div class="container py-4 page-animation">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
        <h2 class="custom-title m-0">Consultorios de {{ centroNombre }}</h2>
        <a [routerLink]="['/centros_atencion', centroId, 'consultorios', 'new']" class="btn-purple-main">
            <i class="fa fa-plus"></i> Nuevo Consultorio
        </a>
    </div>
    <div class="content-wrapper">
        <div class="table-responsive">
            <table class="table-custom">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nombre</th>
                        <th class="text-right">Operaciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let consultorio of resultsPage.content">
                        <td class="text-muted font-weight-bold">#{{ consultorio.id }}</td>
                        <td style="font-weight: 500;">{{ consultorio.nombre }}</td>
                        <td class="text-right">
                            <a [routerLink]="['/centros_atencion', centroId, 'consultorios', consultorio.id]"
                                class="btn-purple-main btn-sm mr-2" title="Editar">
                                <i class="fa fa-pencil"></i>
                            </a>
                            <button (click)="remove(consultorio)" class="btn-danger-custom btn-sm" title="Borrar">
                                <i class="fa fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                    <tr *ngIf="resultsPage.content?.length === 0">
                        <td colspan="3" class="text-center py-4 text-muted">No hay consultorios registrados en este
                            centro.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="d-flex align-items-center justify-content-between mt-4">
        <button routerLink="/centros_atencion" class="btn-outline-purple">
            <i class="fa fa-arrow-left"></i> Volver a Centros
        </button>
        <app-pagination [totalPages]="resultsPage.totalPages" [currentPage]="currentPage"
            (pageChangeRequested)="onPageChangeRequested($event)" [number]="resultsPage.number"
            [hidden]="resultsPage.numberOfElements < 1">
        </app-pagination>
        <div style="width: 150px;" class="d-none d-md-block"></div>
    </div>
</div>
