<div class="container py-4 page-animation">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
        
        <div class="d-flex align-items-center gap-3">
            <button (click)="goBack()" class="btn btn-outline-secondary btn-icon-only" title="Volver al Panel">
                <i class="fa fa-arrow-left m-0"></i>
            </button>
            <h2 class="custom-title m-0">Médicos</h2>
        </div>

        <a *ngIf="isAdmin" routerLink="/medicos/new" class="btn-purple-main">
            <i class="fa fa-plus"></i> Nuevo Médico
        </a>
    </div>

    <div class="content-wrapper">
        <div class="table-responsive">
            <table class="table-custom">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nombre Completo</th>
                        <th>DNI</th>
                        <th>Matrícula</th>
                        <th>Especialidad</th>
                        <th class="text-right">Operaciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let medico of resultsPage.content">
                        <td class="text-muted font-weight-bold">#{{ medico.id }}</td>
                        <td style="font-weight: 500;">{{ medico.apellido }}, {{ medico.nombre }}</td>
                        <td>{{ medico.dni }}</td>
                        <td><span class="badge bg-light text-dark border">{{ medico.matricula }}</span></td>
                        <td>{{ medico.especialidad?.nombre }}</td>
                        <td class="text-right d-flex gap-2 justify-content-end">
                            <a *ngIf="isAdmin" [routerLink]="['/medicos', medico.id]" class="btn-purple-main btn-icon-only"
                                title="Editar">
                                <i class="fa fa-pencil m-0"></i>
                            </a>
                            <button *ngIf="isAdmin" (click)="remove(medico)" class="btn-danger-custom btn-icon-only" title="Borrar">
                                <i class="fa fa-trash m-0"></i>
                            </button>
                        </td>
                    </tr>
                    <tr *ngIf="resultsPage.content?.length === 0">
                        <td colspan="6" class="text-center py-4 text-muted">No hay médicos registrados.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="d-flex justify-content-center mt-4">
        <app-pagination [totalPages]="resultsPage.totalPages" [currentPage]="currentPage"
            (pageChangeRequested)="onPageChangeRequested($event)" [number]="resultsPage.number"
            [hidden]="resultsPage.numberOfElements < 1">
        </app-pagination>
    </div>
</div>
