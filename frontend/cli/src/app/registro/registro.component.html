<div class="registro-wrapper">
    <div class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h3 class="card-title text-center mb-4" style="color: #8923dc;">
                            {{ isEditMode ? 'Editar Perfil' : 'Registro de Nuevo Paciente' }}
                        </h3>

                        <div *ngIf="errorMessage" class="alert alert-danger text-center">
                            {{ errorMessage }}
                        </div>

                        <div *ngIf="successMessage" class="alert alert-success text-center">
                            {{ successMessage }}
                        </div>

                        <form (ngSubmit)="onSubmit()" #registroForm="ngForm">

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="nombre" class="form-label fw-bold">Nombre *</label>
                                    <input type="text" class="form-control" id="nombre" [(ngModel)]="paciente.nombre"
                                        name="nombre" required placeholder="Juan" [disabled]="isEditMode">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="apellido" class="form-label fw-bold">Apellido *</label>
                                    <input type="text" class="form-control" id="apellido"
                                        [(ngModel)]="paciente.apellido" name="apellido" required placeholder="Pérez" [disabled]="isEditMode">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="dni" class="form-label fw-bold">DNI *</label>
                                    <input type="text" class="form-control" id="dni" [(ngModel)]="paciente.dni"
                                        name="dni" required placeholder="12345678" [disabled]="isEditMode">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="fechaNacimiento" class="form-label fw-bold">Fecha de Nacimiento
                                        *</label>
                                    <input type="date" class="form-control" id="fechaNacimiento"
                                        [(ngModel)]="paciente.fechaNacimiento" name="fechaNacimiento" required [disabled]="isEditMode">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="obraSocial" class="form-label fw-bold">Obra Social</label>
                                <select class="form-select" id="obraSocial" [(ngModel)]="paciente.obraSocialId"
                                    name="obraSocialId">
                                    <option [ngValue]="null">Particular / Ninguna</option>
                                    <option *ngFor="let os of obrasSociales" [value]="os.id">
                                        {{ os.nombre }}
                                    </option>
                                </select>
                            </div>

                            <hr class="my-4">

                            <div class="mb-4">
                                <label for="username" class="form-label fw-bold text-purple">Nombre de Usuario Exclusivo
                                    *</label>
                                <input type="text" class="form-control form-control-lg custom-input-purple"
                                    id="username" [(ngModel)]="username" name="username" required
                                    placeholder="Ej: jperez" autocomplete="off">
                                <div class="form-text">Este dato será el único solicitado cuando quiera acceder al
                                    portal.</div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-purple-submit btn-lg"
                                    [disabled]="!registroForm.form.valid || !username.trim()">
                                    {{ isEditMode ? 'Guardar Cambios' : 'Finalizar Registro' }}
                                </button>
                                <a [routerLink]="isEditMode ? ['/usuario'] : ['/login']" class="btn btn-light text-center">
                                    Cancelar y Volver
                                </a>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
